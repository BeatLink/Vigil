# Vigil Configuration Sample

# Database settings
database:
  path: "vigil.db"

# Theme (all fields are optional — defaults shown below)
theme:
  primary:          "#00ACFF"   # Header, links, accents
  accent:           "#FF5500"   # Secondary accent (unused in current UI)
  background:       "#FFFFFF"   # Sidebar and card backgrounds
  background_muted: "#FAFAFA"   # Page body background
  text:             "#111827"   # Primary text
  text_muted:       "#6B7280"   # Labels and secondary text
  status_online:    "lime"      # Online status color
  status_warning:   "gold"      # Warning status color
  status_failed:    "red"       # Failed status color
  status_offline:   "lightgray" # Offline status color

# Domain-based Plugins
plugins:
  - name: "Device Availability"
    type: "group"
    children:
      - name: "Core Devices"
        type: "group"
        children:
          - name: "Ragnarok"
            id: "ragnarok"
            type: "uptime"
            target_host: "ragnarok.technet"
            interval: 30s
          - name: "Heimdall"
            id: "heimdall"
            type: "uptime"
            target_host: "heimdall.technet"
            interval: 30s
          - name: "Odin"
            id: "odin"
            type: "uptime"
            target_host: "odin.technet"
            interval: 30s
          - name: "Thor"
            id: "thor"
            type: "uptime"
            target_host: "thorx.technet"
      - name: "IoT Sensors"
        type: "group"
        children:
          - name: "Bedroom Light"
            id: "bedroom-light"
            type: "uptime"
            target_host: "light-bedroom.lan"
          - name: "Bedroom Desk Light"
            id: "bedroom-desk-light"
            type: "uptime"
            target_host: "light-bedroom-desk.lan"
          - name: "Kitchen Light"
            id: "kitchen-light"
            type: "uptime"
            target_host: "light-kitchen.lan"
          - name: "Bathroom Light"
            id: "bathroom-light"
            type: "uptime"
            target_host: "light-bathroom.lan"
          - name: "Outside Light"
            id: "outside-light"
            type: "uptime"
            target_host: "light-outside.lan"
          - name: "Fan Socket"
            id: "fan-socket"
            type: "uptime"
            target_host: "socket-fan.lan"
          - name: "Ragnarok Socket"
            id: "ragnarok-socket"
            type: "uptime"
            target_host: "socket-ragnarok.technet"
          - name: "Fan IR"
            id: "fan-ir"
            type: "uptime"
            target_host: "ir-fan.lan"
          - name: "Bedroom Sensor"
            id: "bedroom-sensor"
            type: "uptime"
            target_host: "sensor-bedroom.lan"
          - name: "Bathroom Sensor"
            id: "bathroom-sensor"
            type: "uptime"
            target_host: "sensor-bathroom.lan"

  - name: "System Stats"
    type: "group"
    children:
      - name: "Ragnarok System"
        id: "ragnarok-system"
        type: "system_stats"
        interval: 1m
        cpu_warning: 70
        cpu_threshold: 85
        memory_warning: 75
        memory_threshold: 90
        temp_warning: 70
        temp_threshold: 80
        load_warning: 70
        load_threshold: 100
        ssh_config:
          host: "ragnarok.technet"
      - name: "Heimdall System"
        id: "heimdall-system"
        type: "system_stats"
        interval: 1m
        cpu_warning: 70
        cpu_threshold: 85
        memory_warning: 75
        memory_threshold: 90
        temp_warning: 70
        temp_threshold: 80
        load_warning: 70
        load_threshold: 100
        ssh_config:
          host: "heimdall.technet"
      - name: "Odin System"
        id: "odin-system"
        type: "system_stats"
        interval: 1m
        cpu_warning: 70
        cpu_threshold: 85
        memory_warning: 75
        memory_threshold: 90
        temp_warning: 70
        temp_threshold: 80
        load_warning: 70
        load_threshold: 100
        ssh_config:
          host: "odin.technet"

  - name: "Running Services"
    type: "group"
    children:
      - name: "Ragnarok Services"
        id: "ragnarok-services"
        type: "group"
        children:
          - name: "NixOS Upgrade"
            id: "ragnarok-nixos-upgrade"
            type: "systemd_service"
            interval: 1h
            service_name: "nixos-upgrade.service"
            max_age: 1w
            ssh_config:
              host: "ragnarok.technet"
