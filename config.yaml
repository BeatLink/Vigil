# Vigil Configuration Sample

# Database settings
database:
  path: "vigil.db"

# Domain-based Plugins
plugins:
  - name: "Local Infrastructure"
    type: "group"
    children:
      - name: "bluetooth"
        id: "local-bluetooth"
        type: "systemd_service"
        interval: 60
        service_name: "bluetooth.service"
        ssh_config:
          host: "localhost"
  - name: "google-dns"
    type: "uptime"
    target_host: "8.8.8.8"
    interval: 30

  - name: "Heimdall Services"
    type: "group"
    children:
      - name: "Unbound"
        id: "heimdall-unbound"
        type: "systemd_service"
        interval: 60
        service_name: "unbound.service"
        ssh_config:
          host: "heimdall.technet"
      - name: "VLC"
        id: "heimdall-vlc"
        type: "systemd_service"
        interval: 60
        service_name: "vlc-audio.service"
        ssh_config:
          host: "heimdall.technet"
