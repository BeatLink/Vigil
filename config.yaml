# Vigil Configuration Sample

# Database settings
database:
  path: "vigil.db"

# Domain-based Plugins
plugins:
  - name: "nginx-logs"
    type: "systemd"
    target_host: "192.168.1.10"
    interval: 60
    service_name: "nginx"
    lines: 20
    ssh_config:
      username: "monitor"
      key_path: "~/.ssh/id_rsa"
      # password: "securepassword" # Alternatively use password auth
      port: 22
