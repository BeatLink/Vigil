# Vigil Configuration Sample
#
# This is a minimal example. A full deployment (the TechNet homelab) is defined
# declaratively in NixOS via services.vigil — see that module for a complete,
# real-world plugin tree.

# Database settings
database:
  path: "vigil.db"

# Log storage settings
# Collected log lines (e.g. journald output) are stored persistently and
# deduplicated. Old lines are pruned automatically.
logging:
  retention_days: 30   # Days to keep log lines; 0 disables pruning (keep forever)

# Metric export (optional).
# Prometheus is always available (pull) at GET /metrics — no config needed.
# InfluxDB is a push exporter: enable it here to periodically ship metrics.
# exporters:
#   influxdb:
#     url: "http://localhost:8086"
#     interval: 30            # seconds between pushes
#     # InfluxDB 2.x:
#     org: "my-org"
#     bucket: "vigil"
#     token: "my-api-token"
#     # InfluxDB 1.x (use instead of org/bucket/token):
#     # database: "vigil"

# Global SSH connection defaults.
# Merged into every plugin's `ssh_config` unless the plugin overrides a given
# key, so a single username/key can apply across all SSH-based monitors instead
# of being repeated on each one.
ssh_defaults:
  username: "beatlink"
  # key_path: "/path/to/private_key"   # optional; falls back to the SSH agent

# Theme (all fields are optional — defaults shown below)
theme:
  primary:          "#00ACFF"   # Header, links, accents
  accent:           "#FF5500"   # Secondary accent (unused in current UI)
  background:       "#FFFFFF"   # Sidebar and card backgrounds
  background_muted: "#FAFAFA"   # Page body background
  text:             "#111827"   # Primary text
  text_muted:       "#6B7280"   # Labels and secondary text
  status_online:    "lime"      # Online status color
  status_warning:   "gold"      # Warning status color
  status_failed:    "red"       # Failed status color
  status_offline:   "lightgray" # Offline status color

# Domain-based Plugins
plugins:
  - name: "Devices"
    type: "group"
    children:
      - name: "My Server"
        id: "my-server"
        type: "uptime"
        target_host: "server.example.com"
        interval: 30s

  - name: "My Server Stats"
    type: "group"
    grid_columns: 4
    children:
      - name: "CPU"
        id: "server-cpu"
        type: "cpu_usage"
        interval: 1m
        cpu_warning: 70
        cpu_threshold: 85
        ssh_config:
          host: "server.example.com"
      - name: "Memory"
        id: "server-memory"
        type: "memory_usage"
        interval: 1m
        memory_warning: 75
        memory_threshold: 90
        ssh_config:
          host: "server.example.com"
      - name: "/"
        id: "server-disk-root"
        type: "disk_space"
        path: "/"
        threshold: 90
        interval: 10m
        ssh_config:
          host: "server.example.com"

  - name: "Services"
    type: "group"
    children:
      - name: "Nginx"
        id: "server-nginx"
        type: "systemd_service"
        interval: 1m
        service_name: "nginx.service"
        ssh_config:
          host: "server.example.com"

  - name: "Backups"
    type: "group"
    children:
      - name: "Nightly Backup"
        id: "server-backup"
        type: "borg"
        interval: 1h
        max_age: 1d
        repo: "/path/to/borg/repo"
        # passphrase_command: "cat /etc/vigil/borg.pass"   # for encrypted repos
        ssh_config:
          host: "server.example.com"

  - name: "Server I/O & Network"
    type: "group"
    grid_columns: 4
    children:
      - name: "Disk I/O"
        id: "server-diskio"
        type: "diskio"
        interval: 1m
        # device: "nvme0n1"   # optional; auto-detects the busiest physical disk
        ssh_config:
          host: "server.example.com"
      - name: "Interrupts"
        id: "server-interrupts"
        type: "interrupts"
        interval: 1m
        irq_warning: 20000     # interrupts/sec
        irq_threshold: 50000
        ssh_config:
          host: "server.example.com"
      - name: "Connections"
        id: "server-connections"
        type: "connections"
        interval: 1m
        total_warning: 500     # total TCP connections
        total_threshold: 1000
        ssh_config:
          host: "server.example.com"
      - name: "WiFi"
        id: "server-wifi"
        type: "wifi"
        interval: 1m
        # interface: "wlan0"   # optional; auto-detects the strongest link
        quality_warning: 40    # link quality floor (warn below)
        quality_threshold: 20  # link quality floor (fail below)
        ssh_config:
          host: "server.example.com"

  - name: "Reachability"
    type: "group"
    children:
      - name: "Port & URL Checks"
        id: "server-ports"
        type: "ports"
        interval: 1m
        timeout: 5             # per-check timeout (seconds)
        checks:
          - name: "SSH"        # TCP check (bash /dev/tcp)
            host: "server.example.com"
            port: 22
          - name: "API Health" # URL check (curl; 2xx/3xx = up)
            url: "https://api.example.com/health"
        ssh_config:
          host: "server.example.com"

  - name: "GPU & Containers"
    type: "group"
    grid_columns: 4
    children:
      - name: "GPU"
        id: "server-gpu"
        type: "gpu"
        interval: 1m
        util_warning: 85       # GPU util % (warn / fail)
        util_threshold: 95
        mem_warning: 85        # VRAM % (warn / fail)
        mem_threshold: 95
        temp_warning: 80       # °C (warn / fail)
        temp_threshold: 90
        ssh_config:
          host: "server.example.com"   # target needs nvidia-smi
      - name: "Docker"
        id: "server-docker"
        type: "containers"
        interval: 1m
        runtime: "docker"      # or "podman"
        expect_running:        # these must be up, else failed; also gives Restart actions
          - "nginx"
          - "postgres"
        stopped_warning: true  # any other stopped container -> warning
        ssh_config:
          host: "server.example.com"

  - name: "RAID"
    type: "group"
    children:
      - name: "Software RAID"
        id: "server-raid"
        type: "raid"           # parses /proc/mdstat (mdadm)
        interval: 5m
        ssh_config:
          host: "server.example.com"

  - name: "Custom Checks"
    type: "group"
    children:
      - name: "Cert Expiry (days)"
        id: "server-cert-expiry"
        type: "command"
        interval: 6h
        # Extract a number from stdout and threshold it. `invert: true` means
        # LOWER is worse (fewer days left = more urgent).
        command: >
          days=$(( ( $(date -d "$(openssl x509 -enddate -noout -in /etc/ssl/cert.pem | cut -d= -f2)" +%s) - $(date +%s) ) / 86400 ));
          echo "days=$days"
        pattern: 'days=(-?\d+)'
        warning: 21            # warn when <= 21 days
        threshold: 7           # fail when <= 7 days
        invert: true
        value_label: "DAYS LEFT"
        value_unit: " d"
        ssh_config:
          host: "server.example.com"
      - name: "Reboot Required"
        id: "server-reboot-required"
        type: "command"
        interval: 1h
        # No pattern -> status is driven by exit code (0 = online, non-zero = below).
        command: "test ! -f /var/run/reboot-required"
        nonzero_is_warning: true   # reboot pending -> warning, not failed
        ssh_config:
          host: "server.example.com"

  - name: "Storage & VMs"
    type: "group"
    children:
      - name: "Filesystems"
        id: "server-filesystems"
        type: "filesystems"    # auto-discovers ALL real mounts (no per-path config)
        interval: 5m
        warning: 80            # usage % (warn / fail), applied to every filesystem
        threshold: 90
        ssh_config:
          host: "server.example.com"
      - name: "Folders"
        id: "server-folders"
        type: "folders"        # watch sizes of arbitrary directories via du
        interval: 1h
        folders:
          - path: "/var/log"
            warning: 5          # GB (warn / fail)
            threshold: 10
          - path: "/srv/media"  # size-only (no thresholds) — just track growth
        ssh_config:
          host: "server.example.com"
      - name: "Virtual Machines"
        id: "server-vms"
        type: "vms"            # libvirt/KVM via virsh
        interval: 1m
        # uri: "qemu:///system"       # optional; this is the default
        expect_running:               # these must be up, else failed; gives Start/Shutdown actions
          - "web"
        ssh_config:
          host: "server.example.com"

  - name: "Cloud"
    type: "group"
    children:
      - name: "Instance Metadata"
        id: "server-cloud"
        type: "cloud"          # detects AWS/GCP/Azure via the metadata endpoint
        interval: 15m
        provider: "auto"       # or "aws" / "gcp" / "azure"
        ssh_config:
          host: "server.example.com"
