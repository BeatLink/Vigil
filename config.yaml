# Vigil Configuration Sample

# Database settings
database:
  path: "vigil.db"

# Domain-based Plugins
plugins:
  - name: "Device Availability"
    type: "group"
    children:
      - name: "Core Devices"
        type: "group"
        children:
          - name: "Ragnarok"
            id: "ragnarok"
            type: "uptime"
            target_host: "ragnarok.technet"
            interval: 30s
          - name: "Heimdall"
            id: "heimdall"
            type: "uptime"
            target_host: "heimdall.technet"
            interval: 30s
          - name: "Odin"
            id: "odin"
            type: "uptime"
            target_host: "odin.technet"
            interval: 30s
          - name: "Thor"
            id: "thor"
            type: "uptime"
            target_host: "thorx.technet"
      - name: "IoT Sensors"
        type: "group"
        children:
          - name: "Bedroom Light"
            id: "bedroom-light"
            type: "uptime"
            target_host: "light-bedroom.lan"
          - name: "Bedroom Desk Light"
            id: "bedroom-desk-light"
            type: "uptime"
            target_host: "light-bedroom-desk.lan"
          - name: "Kitchen Light"
            id: "kitchen-light"
            type: "uptime"
            target_host: "light-kitchen.lan"
          - name: "Bathroom Light"
            id: "bathroom-light"
            type: "uptime"
            target_host: "light-bathroom.lan"
          - name: "Outside Light"
            id: "outside-light"
            type: "uptime"
            target_host: "light-outside.lan"
          - name: "Fan Socket"
            id: "fan-socket"
            type: "uptime"
            target_host: "socket-fan.lan"
          - name: "Ragnarok Socket"
            id: "ragnarok-socket"
            type: "uptime"
            target_host: "socket-ragnarok.technet"
          - name: "Fan IR"
            id: "fan-ir"
            type: "uptime"
            target_host: "ir-fan.lan"
          - name: "Bedroom Sensor"
            id: "bedroom-sensor"
            type: "uptime"
            target_host: "sensor-bedroom.lan"
          - name: "Bathroom Sensor"
            id: "bathroom-sensor"
            type: "uptime"
            target_host: "sensor-bathroom.lan"

  - name: "Running Services"
    type: "group"
    children:
      - name: "Ragnarok Services"
        id: "ragnarok-services"
        type: "group"
        children:
          - name: "NixOS Upgrade"
            id: "ragnarok-nixos-upgrade"
            type: "systemd_service"
            interval: 1h
            service_name: "nixos-upgrade.service"
            max_age: 1w
            ssh_config:
              host: "ragnarok.technet"
      - name: "Heimdall Services"
        id: "heimdall-services"
        type: "group"
        children:
          - name: "NixOS Upgrade"
            id: "heimdall-nixos-upgrade"
            type: "systemd_service"
            interval: 1h
            service_name: "nixos-upgrade.service"
            max_age: 1w
            ssh_config:
              host: "heimdall.technet"
          - name: "Unbound"
            id: "heimdall-unbound"
            type: "systemd_service"
            interval: 1m
            service_name: "unbound.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "VLC"
            id: "heimdall-vlc"
            type: "systemd_service"
            interval: 1m
            service_name: "vlc-audio.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Nginx"
            id: "heimdall-nginx"
            type: "systemd_service"
            interval: 1m
            service_name: "nginx.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Pi-hole"
            id: "heimdall-pihole"
            type: "systemd_service"
            interval: 1m
            service_name: "pihole-ftl.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Home Assistant"
            id: "heimdall-home-assistant"
            type: "systemd_service"
            interval: 1m
            service_name: "home-assistant.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Frigate"
            id: "heimdall-frigate"
            type: "systemd_service"
            interval: 1m
            service_name: "frigate.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "go2rtc"
            id: "heimdall-go2rtc"
            type: "systemd_service"
            interval: 1m
            service_name: "go2rtc.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Loki"
            id: "heimdall-loki"
            type: "systemd_service"
            interval: 1m
            service_name: "loki.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Prometheus"
            id: "heimdall-prometheus"
            type: "systemd_service"
            interval: 1m
            service_name: "prometheus.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Grafana"
            id: "heimdall-grafana"
            type: "systemd_service"
            interval: 1m
            service_name: "grafana.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Uptime Kuma"
            id: "heimdall-uptime-kuma"
            type: "systemd_service"
            interval: 1m
            service_name: "uptime-kuma.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "FreshRSS"
            id: "heimdall-freshrss"
            type: "systemd_service"
            interval: 1m
            service_name: "phpfpm-freshrss.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "qBittorrent"
            id: "heimdall-qbittorrent"
            type: "systemd_service"
            interval: 1m
            service_name: "qbittorrent.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Openbooks"
            id: "heimdall-openbooks"
            type: "systemd_service"
            interval: 1m
            service_name: "openbooks.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Traccar"
            id: "heimdall-traccar"
            type: "systemd_service"
            interval: 1m
            service_name: "traccar.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "ESPHome"
            id: "heimdall-esphome"
            type: "systemd_service"
            interval: 1m
            service_name: "esphome.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Glances"
            id: "heimdall-glances"
            type: "systemd_service"
            interval: 1m
            service_name: "glances.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Homepage"
            id: "heimdall-homepage"
            type: "systemd_service"
            interval: 1m
            service_name: "homepage-dashboard.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "DDNS Updater"
            id: "heimdall-ddns-updater"
            type: "systemd_service"
            interval: 1m
            service_name: "ddns-updater.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Blockurl"
            id: "heimdall-blockurl"
            type: "systemd_service"
            interval: 1m
            service_name: "blockurl.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Radicale"
            id: "heimdall-radicale"
            type: "systemd_service"
            interval: 1m
            service_name: "radicale.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Syncthing"
            id: "heimdall-syncthing"
            type: "systemd_service"
            interval: 1m
            service_name: "syncthing.service"
            ssh_config:
              host: "heimdall.technet"
          - name: "Trilium"
            id: "heimdall-trilium"
            type: "systemd_service"
            interval: 1m
            service_name: "trilium-server.service"
            ssh_config:
              host: "heimdall.technet"
      - name: "Odin Services"
        id: "odin-services"
        type: "group"
        children:
          - name: "NixOS Upgrade"
            id: "odin-nixos-upgrade"
            type: "systemd_service"
            interval: 1h
            service_name: "nixos-upgrade.service"
            max_age: 1w
            ssh_config:
              host: "odin.technet"
          - name: "Networking"
            id: "odin-networking"
            type: "systemd_service"
            interval: 1m
            service_name: "NetworkManager.service"
            ssh_config:
              host: "odin.technet"
          - name: "Bluetooth"
            id: "local-bluetooth"
            type: "systemd_service"
            interval: 1m
            service_name: "bluetooth.service"
            ssh_config:
              host: "odin.technet"

  - name: "Disk Health"
    type: "group"
    children:
      - name: "Ragnarok Disk Health"
        type: "group"
        children:
          - name: "Ragnarok SMART"
            id: "ragnarok-smart"
            type: "smart_disk"
            interval: 1h
            ssh_config:
              host: "ragnarok.technet"
          - name: "Ragnarok ZFS Health"
            id: "ragnarok-zfs-health"
            type: "zfs_health"
            interval: 1h
            ssh_config:
              host: "ragnarok.technet"
      - name: "Heimdall Disk Health"
        type: "group"
        children:
          - name: "Heimdall SMART"
            id: "heimdall-smart"
            type: "smart_disk"
            interval: 1h
            ssh_config:
              host: "heimdall.technet"
          - name: "Heimdall ZFS Health"
            id: "heimdall-zfs-health"
            type: "zfs_health"
            interval: 1h
            ssh_config:
              host: "heimdall.technet"
      - name: "Odin Disk Health"
        type: "group"
        children:
          - name: "Odin SMART"
            id: "odin-smart"
            type: "smart_disk"
            interval: 1h
            ssh_config:
              host: "odin.technet"
          - name: "Odin ZFS Health"
            id: "odin-zfs-health"
            type: "zfs_health"
            interval: 1h
            ssh_config:
              host: "odin.technet"

  - name: "ZFS Storage"
    type: "group"
    children:
      - name: "Ragnarok Storage"
        type: "group"
        children:
          - name: "Ragnarok Data Pool"
            id: "ragnarok-data-pool"
            type: "zfs_pool"
            pool: "data-pool-Ragnarok"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "ragnarok.technet"
          - name: "Ragnarok Root Pool"
            id: "ragnarok-root-pool"
            type: "zfs_pool"
            pool: "root-pool-Ragnarok"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "ragnarok.technet"
      - name: "Heimdall Storage"
        type: "group"
        children:
          - name: "Heimdall Data Pool"
            id: "heimdall-data-pool"
            type: "zfs_pool"
            pool: "data-pool-Heimdall"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "heimdall.technet"
          - name: "Heimdall Root Pool"
            id: "heimdall-root-pool"
            type: "zfs_pool"
            pool: "root-pool-Heimdall"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "heimdall.technet"
      - name: "Odin Storage"
        type: "group"
        children:
          - name: "Odin Data Pool"
            id: "odin-data-pool"
            type: "zfs_pool"
            pool: "data-pool-Odin"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "odin.technet"
          - name: "Odin Root Pool"
            id: "odin-root-pool"
            type: "zfs_pool"
            pool: "root-pool-Odin"
            threshold: 90
            interval: 10m
            ssh_config:
              host: "odin.technet"
