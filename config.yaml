# Vigil Configuration Sample

# Database settings
database:
  path: "vigil.db"

# Domain-based Plugins
plugins:
  - name: "bluetooth"
    type: "systemd_service"
    interval: 60
    service_name: "bluetooth.service"
    lines: 20
    ssh_config:
      host: "localhost"
  - name: "google-dns"
    type: "uptime"
    target_host: "8.8.8.8"
    interval: 30
